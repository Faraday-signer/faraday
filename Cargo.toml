[package]
name = "faraday"
version = "0.1.0"
edition = "2021"
description = "Air-gapped Solana transaction signer"

[features]
default = []
simulator = ["dep:minifb", "dep:nokhwa"]

[dependencies]
# Display rendering
embedded-graphics = "0.8"
embedded-graphics-core = "0.4"

# Crypto (all pure Rust)
sha2 = "0.10"
hmac = "0.12"
pbkdf2 = "0.12"
ed25519-dalek = "2"
bs58 = "0.5"
zeroize = { version = "1", features = ["zeroize_derive"] }
hex = "0.4"
base64 = "0.22"
qrcode = "0.14"
getrandom = "0.2"

# QR decoding + image buffer. Shared by both the macOS simulator
# (nokhwa → sim capture) and the Pi camera (v4l → Pi capture).
rqrr = "0.7"
image = { version = "0.25", default-features = false }

# Desktop simulator (optional)
minifb = { version = "0.27", optional = true }
nokhwa = { version = "0.10", default-features = false, features = ["input-avfoundation"], optional = true }

# Pi hardware (Linux only). v4l covers V4L2 ioctls for the Pi camera.
[target.'cfg(target_os = "linux")'.dependencies]
rppal = "0.22"
v4l = "0.14"

[profile.release]
opt-level = "s"
lto = true
strip = true
