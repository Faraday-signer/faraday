[package]
name = "faraday"
version = "0.1.0"
edition = "2021"
description = "Air-gapped Solana transaction signer"

[features]
default = []
# Their refactor splits desktop-sim into webcam vs file-picker variants.
# Keep that, plus our templates feature on top.
_desktop_sim = ["dep:minifb"]
simulator = ["_desktop_sim", "dep:nokhwa"]
simulator_no_cam = ["_desktop_sim", "dep:rfd", "image/png", "image/jpeg"]
templates = ["dep:pdf-writer"]

[[bin]]
name = "faraday"
path = "src/main.rs"

[[bin]]
name = "gen-templates"
path = "src/bin/gen_templates.rs"
required-features = ["templates"]

[[bin]]
name = "gen-test-qr"
path = "src/bin/gen_test_qr.rs"
required-features = ["simulator"]

[[bin]]
name = "gen-test-tx"
path = "src/bin/gen_test_tx.rs"
required-features = ["simulator"]

[dependencies]
# Display rendering
embedded-graphics = "0.8"
embedded-graphics-core = "0.4"

# Crypto (all pure Rust)
sha2 = "0.10"
hmac = "0.12"
pbkdf2 = "0.12"
ed25519-dalek = "2"
bs58 = "0.5"
zeroize = { version = "1", features = ["zeroize_derive"] }
hex = "0.4"
base64 = "0.22"
qrcode = "0.14"
ur = { version = "0.4", default-features = false }
getrandom = "0.2"

# QR decoding + image buffer. Shared by both the macOS simulator (nokhwa)
# and the Pi camera (MMAL via a raspividyuv subprocess — see pi_camera.rs).
rqrr = "0.7"
image = { version = "0.25", default-features = false, features = ["png"] }

# Desktop simulator (optional)
minifb = { version = "0.27", optional = true }
nokhwa = { version = "0.10", default-features = false, features = ["input-avfoundation"], optional = true }
rfd = { version = "0.17", optional = true, default-features = false, features = ["xdg-portal"] }

# Printable template generator (optional, dev-only). Cross-compile builds for
# the Pi don't enable this feature so pdf-writer never ends up in the image.
pdf-writer = { version = "0.14", optional = true }

# Pi hardware (Linux only). Camera goes through a raspividyuv subprocess
# (MMAL path) rather than a V4L2 crate — the kernel V4L2 shim couldn't
# deliver frames on this firmware.
[target.'cfg(target_os = "linux")'.dependencies]
rppal = "0.22"

[profile.release]
opt-level = "s"
lto = true
strip = true
