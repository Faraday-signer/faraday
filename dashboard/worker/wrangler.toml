name = "faraday-squads-indexer"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# KV namespace holding the member -> multisig[] reverse index.
# After running `wrangler kv:namespace create MULTISIG_INDEX`, replace the
# placeholder `id` below with the value the command prints.
[[kv_namespaces]]
binding = "MULTISIG_INDEX"
id = "ddca6d31d2084f9c87d73f08df319ce4"

# Optional: a preview namespace so `wrangler dev` doesn't write to prod.
# Run `wrangler kv:namespace create MULTISIG_INDEX --preview` and paste the id.
# preview_id = "REPLACE_ME"

[vars]
# Override per-environment. Empty by default — set the secret with
# `wrangler secret put HELIUS_AUTH_TOKEN`.
