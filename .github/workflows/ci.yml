name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Treat all rustc warnings as hard errors. Keeps the warning count at
  # zero so real issues stand out.
  RUSTFLAGS: "-D warnings"
  CARGO_TERM_COLOR: always

jobs:
  rust-host:
    name: Rust (host - ${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features: [simulator, simulator_no_cam]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: raspberry-pi
      # Some optional deps (nokhwa, minifb) need X11/V4L2 headers on Linux.
      - name: Install linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libv4l-dev libudev-dev libxkbcommon-dev pkg-config
      - name: cargo check
        working-directory: raspberry-pi
        run: cargo check --features ${{ matrix.features }}

  rust-test:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: raspberry-pi
      - name: Install linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libv4l-dev libudev-dev libxkbcommon-dev pkg-config
      - name: cargo test
        working-directory: raspberry-pi
        run: cargo test --features simulator

  rust-arm:
    name: Rust (Pi Zero ARM cross-compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: arm-unknown-linux-gnueabihf
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: raspberry-pi
          key: arm
      - uses: mlugg/setup-zig@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild
      - name: cargo zigbuild (ARM)
        working-directory: raspberry-pi
        run: cargo zigbuild --release --target arm-unknown-linux-gnueabihf

  rust-core-touch:
    name: Rust core (tests + touch-ui feature)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      # Security-critical tests (BIP39/SLIP-0010 vectors, tx parsers, signer,
      # QR/UR decode) live in faraday-core. Run them on both the pure-Rust
      # default path and the touch-ui path so the cfg-forked GUI halves compile
      # and their tests run. hardware-sha512 is NOT enabled on host: it needs
      # esp-idf-sys and won't build.
      - name: cargo test core (default features)
        working-directory: core
        run: cargo test
      - name: cargo test core with touch-ui
        working-directory: core
        run: cargo test --features touch-ui

  esp32-build:
    name: Rust (ESP32-S3 build + radio-symbol audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: esp-rs/xtensa-toolchain@v1.5.3
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: true
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: esp32-touch2
          key: esp32s3
      # This is the first CI job to compile the ESP32 firmware at all. Building
      # (not just `cargo check`) is required so the nm audit below has a linked
      # ELF to inspect.
      - name: cargo build (ESP32-S3-Touch-LCD-2)
        working-directory: esp32-touch2
        run: cargo build --release
      # Air-gap invariant: the WiFi/BT driver stack must NOT be linked into the
      # firmware. We look for the driver *entrypoints* (type T — present only if
      # the driver object is linked), NOT the always-present silicon-ROM radio
      # routines (type A, absolute). If any resolve, the air-gap claim is void.
      # These 5 symbols are the mandatory driver-init CHOKEPOINTS — any use of
      # the WiFi/BT stack must route through them — so this is a chokepoint
      # gate, not an exhaustive radio-symbol list a maintainer must keep complete.
      - name: nm radio-symbol audit (fail if WiFi/BT driver linked)
        working-directory: esp32-touch2
        run: |
          NM=$(ls "$HOME"/.rustup/toolchains/esp/xtensa-esp-elf/*/xtensa-esp-elf/bin/xtensa-esp32s3-elf-nm | head -1)
          ELF=target/xtensa-esp32s3-espidf/release/faraday-esp32-touch2
          echo "Auditing $ELF"
          HITS=$("$NM" --defined-only "$ELF" \
            | grep -E ' [Tt] .*(esp_wifi_init|esp_wifi_start|esp_wifi_set_mode|esp_bt_controller_init|esp_bt_controller_enable)$' \
            || true)
          if [ -n "$HITS" ]; then
            echo "::error::WiFi/BT driver symbols linked into the air-gapped firmware:"
            echo "$HITS"
            exit 1
          fi
          echo "OK: no WiFi/BT driver entrypoints linked."

  extension:
    name: Extension typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - name: npm ci
        working-directory: extension
        run: npm ci
      - name: typecheck
        working-directory: extension
        run: npm run typecheck

  mobile:
    name: Mobile typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: npm ci
        working-directory: mobile
        run: npm ci
      - name: typecheck
        working-directory: mobile
        run: npm run typecheck

  playground:
    name: Playground typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: playground/package-lock.json
      - name: npm ci
        working-directory: playground
        run: npm ci
      - name: typecheck
        working-directory: playground
        run: npm run typecheck
